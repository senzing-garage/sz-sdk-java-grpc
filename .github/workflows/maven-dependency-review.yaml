name: maven dependency review

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  dependency-submission-maven:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - java-version: "17"
            java-distribution: "temurin"

    steps:
      - name: Generate token for private submodules
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_KEY }}

      - name: checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: "Dependency Review"
        uses: actions/dependency-review-action@v4
