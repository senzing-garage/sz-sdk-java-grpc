name: maven linux

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "15 7 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  sdk-versions:
    runs-on: ubuntu-latest
    outputs:
      senzingsdk-versions: ${{ steps.cfg.outputs.senzingsdk-versions }}
    steps:
      - id: cfg
        uses: senzing-factory/build-resources/sdk-versions@v4

  maven-linux:
    needs: sdk-versions
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-distribution: ["temurin"]
        java-version: ["17", "21"]
        senzingsdk-version: ${{ fromJSON(needs.sdk-versions.outputs.senzingsdk-versions) }}

    steps:
      - name: Generate token for private submodules
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_KEY }}

      - name: checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ matrix.java-distribution }}

      - name: install Senzing runtime
        uses: senzing-factory/github-action-install-senzing-sdk@v4
        with:
          packages-to-install: "senzingsdk-runtime senzingsdk-setup"
          senzingsdk-version: ${{ matrix.senzingsdk-version }}

      - name: Build with Maven
        env:
          SENZING_PATH: "/opt/senzing"
        run: |
          java -jar "$SENZING_PATH"/er/sdk/java/sz-sdk.jar -x
          mvn clean install -Pcheckstyle,jacoco,spotbugs -Djacoco.haltOnFailure=false -Djacoco.ignoreFailure=true -Dsenzing.support.dir="/opt/senzing/data" -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Jacoco Report to PR
        id: jacoco
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/target/site/**/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: Code Coverage
          update-comment: true
          skip-if-no-changes: true
          pass-emoji: ":green_circle:"
          fail-emoji: ":red_circle:"

      - name: Fail PR if overall coverage is less than 20%
        if: ${{ github.event_name == 'pull_request' && steps.jacoco.outputs.coverage-overall < 20.0 }}
        uses: actions/github-script@v8
        with:
          script: |
            core.setFailed('Overall coverage is less than 20%!')

      - name: Notify Slack on failure
        if: (failure() || cancelled()) && (github.ref_name == github.event.repository.default_branch || github.event_name == 'schedule')
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          additional-info: "SDK: ${{ matrix.senzingsdk-version }} | Java: ${{ matrix.java-version }}"
