name: maven windows

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "15 7 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  sdk-versions:
    runs-on: ubuntu-latest
    outputs:
      senzingsdk-versions: ${{ steps.cfg.outputs.senzingsdk-versions }}
    steps:
      - id: cfg
        uses: senzing-factory/build-resources/sdk-versions@v4

  maven-windows:
    needs: sdk-versions
    permissions:
      contents: read
      pull-requests: write
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        java-distribution: ["temurin"]
        java-version: ["17", "21"]
        senzingsdk-version: ${{ fromJSON(needs.sdk-versions.outputs.senzingsdk-versions) }}

    steps:
      - name: Generate token for private submodules
        id: app-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_ID }}
          owner: ${{ github.repository_owner }} # zizmor: ignore[github-app]
          private-key: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_KEY }}
          permission-contents: read

      - name: checkout repository
        uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-java@v5.2.0
        with:
          java-version: ${{ matrix.java-version }}
          distribution: ${{ matrix.java-distribution }}

      - name: Mint staging bucket token
        if: matrix.senzingsdk-version != 'production-v4'
        id: staging-token
        uses: actions/create-github-app-token@v3.2.0
        with:
          client-id: ${{ secrets.SENZINGSDK_STAGING_CLIENT_ID }}
          private-key: ${{ secrets.SENZINGSDK_STAGING_APP_KEY }}
          owner: senzing-factory # zizmor: ignore[github-app]
          repositories: scoop-senzingsdk-staging
          permission-contents: read

      - name: install Senzing SDK
        uses: senzing-factory/github-action-install-senzing-sdk@v5
        with:
          senzingsdk-version: ${{ matrix.senzingsdk-version }}
          senzingsdk-token: ${{ steps.staging-token.outputs.token || github.token }}

      - name: Add to "Path" environment variable
        run: |
          Add-Content $env:GITHUB_PATH "$Env:USERPROFILE\Senzing\er\lib"

      - name: Build with Maven
        run: |
          $Env:SENZING_PATH = "$Env:USERPROFILE\senzing"
          java -jar "$Env:SENZING_PATH\er\sdk\java\sz-sdk.jar" -x
          mvn clean install -B "-Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn" -Pjacoco "-Djacoco.haltOnFailure=false" "-Djacoco.ignoreFailure=true" "-Dsenzing.path=$Env:USERPROFILE\Senzing"

      - name: Jacoco Report to PR
        id: jacoco
        uses: madrapps/jacoco-report@v1.8.0
        with:
          paths: ${{ github.workspace }}/target/site/**/*.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          min-coverage-changed-files: 80
          title: Code Coverage
          update-comment: true
          skip-if-no-changes: true
          pass-emoji: ":green_circle:"
          fail-emoji: ":red_circle:"

      - name: Fail PR if overall coverage is less than 80%
        if: ${{ steps.jacoco.outputs.coverage-overall < 20.0 }}
        uses: actions/github-script@v9
        with:
          script: |
            core.setFailed('Overall coverage is less than 20%!')

      - name: Notify Slack on failure
        if: (failure() || cancelled()) && (github.ref_name == github.event.repository.default_branch || github.event_name == 'schedule')
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
          additional-info: "SDK: ${{ matrix.senzingsdk-version }} | Java: ${{ matrix.java-version }}"
