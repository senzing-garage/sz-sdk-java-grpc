name: Create javadoc documentation

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-[a-z]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions: {}

jobs:
  docs:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Generate token for private submodules
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"

      - name: install Senzing runtime
        uses: senzing-factory/github-action-install-senzing-sdk@v4
        with:
          packages-to-install: "senzingsdk-runtime senzingsdk-setup"
          senzingsdk-version: "production-v4"

      - name: Build with Maven
        env:
          SENZING_PATH: "/opt/senzing"
        run: |
          java -jar "$SENZING_PATH"/er/sdk/java/sz-sdk.jar -x
          mvn clean install -Dsenzing.support.dir="/opt/senzing/data" -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn
          mvn javadoc:javadoc -B -Dorg.slf4j.simpleLogger.log.org.apache.maven.cli.transfer.Slf4jMavenTransferListener=warn

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          publish_branch: gh-pages
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: target/reports/apidocs/
          force_orphan: true

      - name: Notify Slack on failure
        if: failure() || cancelled()
        uses: senzing-factory/build-resources/slack-failure-notification@v4
        with:
          job-status: ${{ job.status }}
          slack-channel: ${{ secrets.SLACK_CHANNEL }}
          slack-bot-token: ${{ secrets.SLACK_BOT_TOKEN }}
