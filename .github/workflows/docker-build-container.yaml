name: Docker build container

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  docker-build-container:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Get repository name
        id: repo-basename
        run: |
          echo "repo=$(basename ${{ github.repository }})" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Generate token for private submodules
        id: app-token
        uses: actions/create-github-app-token@v3.1.1
        with:
          client-id: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_ID }}
          owner: ${{ github.repository_owner }}
          private-key: ${{ secrets.SENZING_GITHUB_SUBMODULE_READ_APP_KEY }}

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          submodules: recursive
          token: ${{ steps.app-token.outputs.token }}

      - name: Build docker image
        uses: senzing-factory/github-action-docker-buildx-build@v2
        with:
          build-options: |
            IMAGE_FINAL=senzing/senzingsdk-runtime:staging
          image-repository: senzing/${{ steps.repo-basename.outputs.repo }}
          password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
          skip-checkout: true
          username: ${{ secrets.DOCKERHUB_USERNAME }}
